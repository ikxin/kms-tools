packages:
  - node-vlmcs
# Sitemap imports Nitro's H3 runtime without declaring it.
packageExtensions:
  '@nuxtjs/sitemap@8.2.2':
    dependencies:
      h3: ^1.15.11
# OG Image's Tailwind integration is optional; keep the app on Tailwind 3.
peerDependencyRules:
  allowedVersions:
    'nuxt-og-image@6.7.2>tailwindcss': ^3.4.19
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  vue-demi: true
  workerd: true
